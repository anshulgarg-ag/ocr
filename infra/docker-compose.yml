
services:

  # ── Object Storage (S3-compatible, self-hosted) ────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── State tracking database ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ocr_pipeline
      POSTGRES_USER: ocr
      POSTGRES_PASSWORD: ocr
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./postgres/create_dbs.sh:/docker-entrypoint-initdb.d/00_create_dbs.sh:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ocr -d ocr_pipeline"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Vector database (embeddings only) ─────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Knowledge graph (full document KG, entities, relations) ───────────────
  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/neo4jpassword
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 2g
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "neo4jpassword", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Prefect orchestration server ───────────────────────────────────────────
  prefect:
    image: prefecthq/prefect:3-latest
    command: prefect server start --host 0.0.0.0
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://ocr:ocr@postgres:5432/prefect
      PREFECT_API_DATABASE_MIGRATE_ON_START: "true"
    ports:
      - "4200:4200"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  # ── MinIO bucket initializer (runs once, then exits) ─────────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing local/ocr-pipeline;
        mc mb --ignore-existing local/ocr-pipeline/raw;
        mc mb --ignore-existing local/ocr-pipeline/processed;
        mc mb --ignore-existing local/ocr-pipeline/chunks;
        echo 'MinIO buckets ready';
      "
    restart: "no"

  # ── Metrics collection ─────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"

  # ── Metrics + logs dashboard ───────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki

  # ── Log aggregation ────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:latest
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    ports:
      - "3100:3100"

  # ── Distributed tracing ────────────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:latest
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP

  # ── Code quality analysis (local SonarQube) ────────────────────────────────
  sonarqube:
    image: sonarqube:latest
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://postgres:5432/sonarqube
      SONAR_JDBC_USERNAME: ocr
      SONAR_JDBC_PASSWORD: ocr
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    ports:
      - "9000:9000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/api/system/status"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── GPU Services ─────────────────────────────────────────────────────────────
  gpu-ocr:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.ocr
    ports:
      - "8001:8001"
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      OCR_WORKERS: "1"
    volumes:
      - ../models:/models
    depends_on:
      minio:
        condition: service_healthy

  gpu-embed:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.embed
    ports:
      - "8002:8002"
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - ../models:/models
    depends_on:
      minio:
        condition: service_healthy

  gpu-graph:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.graph
    ports:
      - "8003:8003"
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - ../models:/models
    depends_on:
      minio:
        condition: service_healthy

  pipeline:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.pipeline
    environment:
      GPU_PROVIDER_TYPE: self_hosted
      GPU_OCR_URL: http://gpu-ocr:8001
      GPU_EMBED_URL: http://gpu-embed:8002
      GPU_GRAPH_URL: http://gpu-graph:8003
      POSTGRES_URL: postgresql+asyncpg://ocr:ocr@postgres:5432/ocr_pipeline
      POSTGRES_SYNC_URL: postgresql://ocr:ocr@postgres:5432/ocr_pipeline
      QDRANT_URL: http://qdrant:6333
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: neo4jpassword
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    depends_on:
      - postgres
      - qdrant
      - neo4j
      - minio
      - gpu-ocr
      - gpu-embed
      - gpu-graph

volumes:
  minio_data:
  postgres_data:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
  prometheus_data:
  grafana_data:
  loki_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
